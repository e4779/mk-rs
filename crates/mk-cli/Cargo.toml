[package]
name = "mk-cli"
version = "0.1.0"
edition = "2021"
description = "mk-rust CLI: Plan 9 mk compatible command-line tool"

[features]
default = []
duckscript = ["mk-shell/duckscript"]

[dependencies]
mk-core = { path = "../mk-core" }
mk-shell = { path = "../mk-shell" }
clap = { version = "4", features = ["derive"] }
