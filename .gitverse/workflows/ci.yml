name: CI

on:
  push:
    branches: [main]
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - run: git clone https://gitverse.ru/${{ github.repository }}.git .
      # rustfmt is available by default; ensure component is present.
      - run: rustup component add rustfmt clippy
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - run: git clone https://gitverse.ru/${{ github.repository }}.git .
      - run: cargo build --verbose
      - run: cargo test --verbose

  coverage:
    # Coverage ratchet — mirrors .githooks/pre-push locally. Fails the CI
    # run if line coverage falls below the baseline in .coverage-baseline.
    # The baseline is bumped manually (or via local pre-push ratchet) when
    # coverage improves.
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - run: git clone https://gitverse.ru/${{ github.repository }}.git .
      - name: Install cargo-llvm-cov + llvm-tools
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked
      - name: Read baseline
        id: baseline
        run: |
          # .coverage-baseline contains a float like '90.17'. Strip to digits+dots.
          baseline=$(tr -dc '0-9.' < .coverage-baseline)
          echo "baseline=$baseline" >> "$GITHUB_OUTPUT"
          echo "Coverage baseline: $baseline%"
      - name: cargo llvm-cov --fail-under-lines
        run: |
          # Mirror the local .githooks/pre-push tolerance: ±0.10% jitter band
          # (parser/scheduler tests are mildly non-deterministic). Strict
          # --fail-under-lines would flap on every run; subtracting the
          # tolerance makes CI symmetric with the local ratchet.
          BASELINE=${{ steps.baseline.outputs.baseline }}
          THRESHOLD=$(awk "BEGIN { printf \"%.2f\", $BASELINE - 0.10 }")
          echo "baseline $BASELINE%, fail-under-lines threshold $THRESHOLD% (baseline − 0.10 jitter tolerance)"
          cargo llvm-cov --workspace --summary-only \
            --fail-under-lines "$THRESHOLD"

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint, coverage]
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - run: |
          git clone https://gitverse.ru/${{ github.repository }}.git .
          git checkout ${{ github.ref_name }}

      - name: Verify version matches tag
        run: |
          version=$(grep '^version' crates/mk-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          test "v$version" = "${{ github.ref_name }}"

      - name: Dry run (core only, others depend on it)
        run: |
          git rev-parse --short HEAD > crates/mk-cli/GIT_HASH
          cp crates/mk-cli/GIT_HASH crates/mk-graph/GIT_HASH
          git add -f crates/mk-cli/GIT_HASH crates/mk-graph/GIT_HASH
          cargo publish --dry-run -p mk-rs-core --allow-dirty

      - name: Publish to crates.io
        run: |
          cargo publish -p mk-rs-core --allow-dirty
          cargo publish -p mk-rs-shell --allow-dirty
          cargo publish -p mk-rs --allow-dirty
          cargo publish -p mk-graph --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
