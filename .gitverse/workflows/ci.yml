name: CI

on:
  push:
    branches: [main]
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - run: git clone https://gitverse.ru/${{ github.repository }}.git .
      # rustfmt is available by default; ensure component is present.
      - run: rustup component add rustfmt clippy
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - run: git clone https://gitverse.ru/${{ github.repository }}.git .
      - run: cargo build --verbose
      - run: cargo test --verbose

  coverage:
    # Coverage ratchet — mirrors .githooks/pre-push locally. Fails the CI
    # run if line coverage falls below the baseline in .coverage-baseline.
    # The baseline is bumped manually (or via local pre-push ratchet) when
    # coverage improves.
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - run: git clone https://gitverse.ru/${{ github.repository }}.git .
      - name: Install cargo-llvm-cov + llvm-tools
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked
      - name: Read baseline
        id: baseline
        run: |
          # .coverage-baseline contains a float like '90.17'. Strip to digits+dots.
          baseline=$(tr -dc '0-9.' < .coverage-baseline)
          echo "baseline=$baseline" >> "$GITHUB_OUTPUT"
          echo "Coverage baseline: $baseline%"
      - name: cargo llvm-cov --fail-under-lines
        run: |
          # Mirror the local .githooks/pre-push tolerance: ±0.10% jitter band
          # (parser/scheduler tests are mildly non-deterministic). Strict
          # --fail-under-lines would flap on every run; subtracting the
          # tolerance makes CI symmetric with the local ratchet.
          BASELINE=${{ steps.baseline.outputs.baseline }}
          THRESHOLD=$(awk "BEGIN { printf \"%.2f\", $BASELINE - 0.10 }")
          echo "baseline $BASELINE%, fail-under-lines threshold $THRESHOLD% (baseline − 0.10 jitter tolerance)"
          cargo llvm-cov --workspace --summary-only \
            --fail-under-lines "$THRESHOLD"

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint, coverage]
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - run: |
          git clone https://gitverse.ru/${{ github.repository }}.git .
          git checkout ${{ github.ref_name }}

      - name: Verify version matches tag
        run: |
          version=$(grep '^version' crates/mk-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          test "v$version" = "${{ github.ref_name }}"

      - name: Dry run (core only, others depend on it)
        run: |
          git rev-parse --short HEAD > crates/mk-cli/GIT_HASH
          cp crates/mk-cli/GIT_HASH crates/mk-graph/GIT_HASH
          git add -f crates/mk-cli/GIT_HASH crates/mk-graph/GIT_HASH
          cargo publish --dry-run -p mk-rs-core --allow-dirty

      # ── Binary release ────────────────────────────────────────────────
      # Build a stripped release binary and pack it as
      #   mk-<version>-x86_64-unknown-linux-gnu.tar.gz
      # (binary name `mk` at the archive root, matching the
      # [package.metadata.binstall] bin-dir in crates/mk-cli/Cargo.toml).
      # Matrix is intentionally a one-liner today (Linux x86_64 covers the
      # zola CI use case); extend TARGETS when macOS/Windows runners are
      # available on gitverse. mk-rust is Unix-first per PLAN §Next 3.
      - name: Build release binary (Linux x86_64)
        run: |
          cargo build --release -p mk-rs
          strip target/release/mk
          ls -lh target/release/mk

      - name: Package binary
        id: pkg
        run: |
          VER="${{ github.ref_name }}"   # v0.2.3
          VER="${VER#v}"                  # 0.2.3
          ARCHIVE="mk-${VER}-x86_64-unknown-linux-gnu.tar.gz"
          tar -C target/release -czf "$ARCHIVE" mk
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "packed $(pwd)/$ARCHIVE ($(du -h "$ARCHIVE" | cut -f1))"

      - name: Publish to crates.io
        run: |
          # Idempotent: skip crates already on crates.io (e.g. on re-runs
          # of the same tag after a downstream step failed). crates.io
          # returns non-zero with "already exists"; we probe the API first.
          VER=$(grep '^version' crates/mk-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          for crate in mk-rs-core mk-rs-shell mk-rs mk-graph; do
            if curl -sf "https://crates.io/api/v1/crates/$crate/$VER" >/dev/null 2>&1; then
              echo "$crate $VER already on crates.io — skipping"
            else
              cargo publish -p "$crate" --allow-dirty
            fi
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Canonical home: gitverse releases (API per gitverse Public API docs —
      # POST /repos/{owner}/{repo}/releases/{id}/assets, multipart/form-data).
      # Idempotent: get-or-create release by tag, delete existing same-name
      # asset before re-upload so re-runs don't 409.
      - name: Upload asset to gitverse release
        env:
          GV_API_TOKEN: ${{ secrets.GV_API_TOKEN }}
          ARCHIVE: ${{ steps.pkg.outputs.archive }}
        run: |
          set -euo pipefail
          # rust:latest lacks jq; install it for JSON parsing.
          apt-get update -qq && apt-get install -y -qq jq >/dev/null
          OWNER=e4779
          REPO=mk-rs
          TAG="${{ github.ref_name }}"
          API="https://api.gitverse.ru/repos/$OWNER/$REPO"
          AUTH="Authorization: Bearer $GV_API_TOKEN"
          ACCEPT="accept: application/vnd.gitverse.object+json;version=1"

          REL=$(curl -sf -H "$AUTH" -H "$ACCEPT" "$API/releases/tags/$TAG" || true)
          if [ -z "$REL" ]; then
            echo "creating gitverse release for $TAG"
            REL=$(curl -sf -X POST -H "$AUTH" -H "$ACCEPT" \
              -H 'Content-Type: application/json' \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":false,\"prerelease\":false}" \
              "$API/releases")
          fi
          REL_ID=$(echo "$REL" | jq -r .id)
          echo "gitverse release id: $REL_ID"

          EXISTING=$(echo "$REL" | jq -r ".assets[]? | select(.name==\"$ARCHIVE\") | .id" || true)
          if [ -n "$EXISTING" ]; then
            echo "deleting existing asset id=$EXISTING"
            curl -sf -X DELETE -H "$AUTH" -H "$ACCEPT" \
              "$API/releases/$REL_ID/assets/$EXISTING" || true
          fi

          curl -sf -X POST -H "$AUTH" -H 'Content-Type: multipart/form-data' \
            -F "attachment=@$ARCHIVE" \
            "$API/releases/$REL_ID/assets?name=$ARCHIVE" >/dev/null
          echo "uploaded $ARCHIVE to gitverse release $REL_ID"

      # Mirror: GitHub releases. cargo-binstall needs a stable URL template
      # (gitverse's per-asset download URL embeds an opaque asset_id).
      # GitHub's `/releases/download/<tag>/<file>` shortcut is stable, so
      # [package.metadata.binstall].pkg-url points at the github mirror.
      # Both remotes receive identical assets.
      - name: Mirror asset to github release (cargo-binstall target)
        env:
          GH_RELEASE_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          ARCHIVE: ${{ steps.pkg.outputs.archive }}
        run: |
          set -euo pipefail
          OWNER=e4779
          REPO=mk-rs
          TAG="${{ github.ref_name }}"
          API="https://api.github.com/repos/$OWNER/$REPO"
          AUTH="Authorization: token $GH_RELEASE_TOKEN"
          ACCEPT="Accept: application/vnd.github+json"

          REL=$(curl -sf -H "$AUTH" -H "$ACCEPT" "$API/releases/tags/$TAG" || true)
          if [ -z "$REL" ]; then
            echo "creating github release for $TAG"
            REL=$(curl -sf -X POST -H "$AUTH" -H "$ACCEPT" \
              -H 'Content-Type: application/json' \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":false,\"prerelease\":false}" \
              "$API/releases")
          fi
          UPLOAD_URL=$(echo "$REL" | jq -r .upload_url | sed 's/{?name,label}//')

          EXISTING=$(echo "$REL" | jq -r ".assets[]? | select(.name==\"$ARCHIVE\") | .id" || true)
          if [ -n "$EXISTING" ]; then
            curl -sf -X DELETE -H "$AUTH" -H "$ACCEPT" \
              "$API/releases/assets/$EXISTING" || true
          fi

          curl -sf -X POST -H "$AUTH" \
            -H "Content-Type: application/gzip" \
            --data-binary "@$ARCHIVE" \
            "$UPLOAD_URL?name=$ARCHIVE" >/dev/null
          echo "mirrored $ARCHIVE to github release"
