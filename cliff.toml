# git-cliff configuration — mk-rust
#
# Generates CHANGELOG.md from Conventional Commits.
# Usage:
#   git-cliff -o CHANGELOG.md          # full history (or since last run)
#   git-cliff --unreleased -o CHANGELOG.md --prepend  # add Unreleased section
#   git-cliff -o CHANGELOG.md v0.2.2..HEAD  # range
#
# See CONTRIBUTING.md for the commit-message convention this config consumes.
# Install git-cliff: cargo install git-cliff

[changelog]
header = """
# Changelog

All notable changes to mk-rust are documented here.

The format is based on [Conventional Commits](https://conventionalcommits.org);
this file is auto-generated by [git-cliff](https://github.com/orhun/git-cliff).

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first | trim_end_matches(pat=".") }}\
            ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/e4779/mk-rs/commit/{{ commit.id }}))
    {% endfor %}
{% endfor %}
"""
trim = true
footer = """
<!-- generated by git-cliff from cliff.toml — do not edit by hand -->
"""

[git]
# Parse conventional commits
conventional_commits = true
# Keep non-conventional commits (our `release:` and `testdata:` types may
# confuse the strict parser) — they fall into "Other" via the catch-all parser.
filter_unconventional = false
# Split commits on line breaks in body for better grouping
split_commits = false

# Order matters: first match wins.
commit_preprocessors = [
  # Strip trailing F-XXX / Bug N references from subject (kept in body if needed)
  { pattern = ' \((F-\d+|Bug \d+)\)$', replace = "" },
]

# Group commits by type → section heading in CHANGELOG.
# Our two custom types: `release:` (release commits) and `testdata:`
# (corpus additions) — mapped to sensible CHANGELOG sections.
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^testdata", group = "Test Data" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI" },
  { message = "^chore", group = "Miscellaneous" },
  { message = "^release", group = "Releases" },
  { message = "^style", group = "Styling" },
  # Breaking changes get their own section regardless of type
  { body = ".*BREAKING CHANGE.*", group = "Breaking Changes" },
  # Anything that slipped through (shouldn't happen with filter_unconventional)
  { message = ".*", group = "Other" },
]

# Only include commits since this tag (older history was pre-convention).
# Bump this forward as needed; remove the line to regenerate full history.
# tag_pattern = "v0.2.0"

# Protect against empty ranges
protect_breaking_commits = false

# GitHub remote for tag/commit links in the changelog.
# Override per-project via [git] remote.github if repo location differs.
remote.github = "e4779/mk-rs"
